<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HYC · 创造者工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Fira Code', monospace, system-ui;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03050b);
            min-height: 100vh;
            color: #eef5ff;
        }

        .glow-text {
            text-shadow: 0 0 5px #00ccff, 0 0 12px #aa44ff;
        }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #020617, #0b1120);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.6s ease;
        }

        .splash-logo {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(45deg, #f0f, #0ff, #fa0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 12px;
            animation: pulseGlow 1.8s infinite;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 0px cyan; opacity: 0.8; }
            100% { text-shadow: 0 0 20px #f0f, 0 0 8px #0ff; opacity: 1; }
        }

        .enter-btn {
            margin-top: 40px;
            background: rgba(255,255,255,0.1);
            border: 2px solid cyan;
            padding: 12px 36px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 60px;
            color: cyan;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }
        .enter-btn:hover {
            background: cyan;
            color: #000;
            box-shadow: 0 0 30px cyan;
        }

        .main-app {
            display: none;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .navbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            background: rgba(10, 20, 35, 0.75);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #c3e2ff;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-btn.active {
            background: cyan;
            color: #0a0f1e;
            box-shadow: 0 0 12px cyan;
        }
        .nav-btn:hover {
            background: rgba(0, 255, 255, 0.2);
            color: white;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 1rem 2rem;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px dashed cyan;
            flex-wrap: wrap;
            gap: 10px;
        }
        .greeting {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .coin-panel {
            background: #1e2a3a;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: bold;
            color: gold;
            border: 1px solid #ffd966;
        }
        .clear-btn {
            background: #8b0000;
            border: none;
            padding: 8px 18px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .clear-btn:hover {
            background: #ff3333;
        }

        .content-pane {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeSlide 0.3s;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .grid-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            margin-top: 1.5rem;
        }
        .code-card {
            background: rgba(20, 30, 55, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.2rem;
            width: 260px;
            border: 1px solid rgba(0,255,255,0.3);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .card-actions button {
            background: #2d3e5f;
            border: none;
            padding: 6px 12px;
            margin: 5px 6px 0 0;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }

        .code-ide {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .ide-toolbar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .ide-toolbar input, .ide-toolbar select {
            background: #0f172a;
            border: 1px solid cyan;
            padding: 8px 12px;
            border-radius: 30px;
            color: white;
        }
        .editor-area {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        textarea {
            flex: 2;
            min-height: 480px;
            background: #0a0f1c;
            border: 1px solid #2c3e66;
            border-radius: 24px;
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #d6eaff;
            resize: vertical;
        }
        .preview-area {
            flex: 1.2;
            background: #ffffff10;
            border-radius: 24px;
            padding: 1rem;
            border: 1px dashed cyan;
        }
        iframe {
            width: 100%;
            height: 400px;
            background: white;
            border-radius: 16px;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }
        .modal-card {
            background: #111827;
            border-radius: 32px;
            padding: 2rem;
            width: 340px;
            border: 1px solid cyan;
            text-align: center;
        }
        .mystery-input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            background: #1f2a3e;
            border: 1px solid cyan;
            color: white;
            margin: 20px 0;
            text-align: center;
        }
        .blue-verified {
            background: #1e88e5;
            border-radius: 30px;
            font-size: 0.7rem;
            padding: 0px 8px;
            margin-left: 8px;
            display: inline-block;
        }
        .infinity-badge {
            background: gold;
            color: black;
            border-radius: 20px;
            padding: 2px 12px;
            font-size: 0.8rem;
            margin-left: 8px;
        }
        .empty-library {
            text-align: center;
            padding: 4rem 2rem;
            color: #8899bb;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="splash-screen" id="splash">
    <div class="splash-logo">HYC</div>
    <div class="splash-logo" style="font-size: 1.5rem; letter-spacing: 4px;">html 工坊</div>
    <button class="enter-btn" id="enterBtn">✨ 立即进入 ✨</button>
</div>

<div class="main-app" id="mainApp">
    <div class="navbar">
        <button class="nav-btn" data-page="home">🏠 主页</button>
        <button class="nav-btn" data-page="library">📚 程序库</button>
        <button class="nav-btn" data-page="coding">💻 开始编程</button>
        <button class="nav-btn" data-page="assets">🎨 素材库</button>
        <button class="nav-btn" data-page="about">👤 关于作者</button>
        <button class="nav-btn" data-page="invite">🎫 邀请码</button>
    </div>

    <div class="user-header">
        <div class="greeting">你好，用户 <span id="randomUserTag"></span></div>
        <div style="display: flex; gap: 12px;">
            <div class="coin-panel"><span>💰</span>累计币: <span id="coinBalance">10</span></div>
            <button class="clear-btn" id="forceClearLibraryBtn">🗑️ 清空程序库</button>
        </div>
    </div>

    <div id="pageContent" class="content-pane"></div>
</div>

<script>
    // ========== 全局数据 ==========
    let userCoins = 10;
    let infiniteMode = false;
    let fixedVisitorCode = "";
    let programLibrary = [];  // 程序库：绝对初始为空！！！
    
    // 访客码（永久不变）
    function getOrCreateVisitorCode() {
        const storedCode = localStorage.getItem("hyc_visitor_unique");
        if(storedCode) return storedCode;
        const newCode = "Guest_" + Math.floor(Math.random() * 90000 + 10000).toString() + "_" + Date.now().toString().slice(-4);
        localStorage.setItem("hyc_visitor_unique", newCode);
        return newCode;
    }
    
    // 保存程序库到本地
    function saveLibraryToMemory() {
        localStorage.setItem("hyc_program_library", JSON.stringify(programLibrary));
    }
    
    // 加载程序库 ———— 绝对不添加任何默认数据！
    function loadLibraryFromMemory() {
        const stored = localStorage.getItem("hyc_program_library");
        if (stored) {
            programLibrary = JSON.parse(stored);
        } else {
            programLibrary = [];
            saveLibraryToMemory();
        }
        // 二次保险：如果 programLibrary 里混入了任何不是用户手动添加的数据？但只信任存储
        // 如果存储的数据本来就是空的，那就保持空
    }
    
    // 强制彻底清空程序库（包括本地存储）
    function forceClearLibrary() {
        programLibrary = [];
        saveLibraryToMemory();
        // 刷新当前页面
        if (currentActivePage === "library") {
            loadPage("library");
        }
        alert("✅ 程序库已彻底清空！现在没有任何程序了。");
    }
    
    // 币值UI
    function updateCoinUI() {
        const coinSpan = document.getElementById("coinBalance");
        if(infiniteMode) {
            coinSpan.innerText = "∞";
        } else {
            coinSpan.innerText = userCoins;
        }
        localStorage.setItem("hyc_userCoins", userCoins);
        localStorage.setItem("hyc_infiniteMode", infiniteMode);
    }
    
    function spendCoins(amount) {
        if(infiniteMode) return true;
        if(userCoins >= amount) {
            userCoins -= amount;
            updateCoinUI();
            return true;
        } else {
            alert(`❌ 累计币不足！需要 ${amount} 币，您只有 ${userCoins} 币。`);
            return false;
        }
    }
    
    function activateInfiniteCoins() {
        if(!infiniteMode) {
            infiniteMode = true;
            updateCoinUI();
            alert("✨ 神秘力量激活！累计币已变为无限 ✨");
        } else {
            alert("无限模式已经生效");
        }
    }
    
    // 素材库
    const assetLibrary = [
        { id: "asset1", name: "🌀 炫酷加载旋转器", price: 10, code: `<!DOCTYPE html><html><head><style>body{display:flex;justify-content:center;align-items:center;height:100vh;background:#111;}.loader{width:80px;height:80px;border:8px solid cyan;border-top:8px solid magenta;border-radius:50%;animation:spin 1s infinite;}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="loader"></div></body></html>` },
        { id: "asset2", name: "🔞 身份实名(满18验证)", price: 10, code: `<!DOCTYPE html><html><body><h2>实名验证</h2><input id="age" placeholder="输入年龄"><button onclick="if(parseInt(age.value)>=18) alert('验证通过 ✅ 已成年') else alert('未满18岁 ❌')">验证</button></body></html>` },
        { id: "asset3", name: "📊 加载进度条演示", price: 10, code: `<!DOCTYPE html><body><progress value="70" max="100"></progress><p>加载示例70%</p></body></html>` },
        { id: "asset4", name: "🔗 网站跳转器", price: 10, code: `<!DOCTYPE html><html><body><input placeholder="输入网址" id="url"><button onclick="location.href=url.value||'https://example.com'">跳转</button></body></html>` },
        { id: "asset5", name: "📝 动态文字展示", price: 10, code: `<!DOCTYPE html><body><h1 id="text">HYC动态文本</h1><button onclick="text.innerText='改变的文字✨'">点击变幻</button></body></html>` },
        { id: "asset6", name: "🎬 视频/图片展示教程", price: 10, code: `<!DOCTYPE html><body><h3>展示图片/视频示例</h3><img src="https://picsum.photos/200/150" alt="随机图"/><p>图片演示</p></body></html>` }
    ];
    
    // 页面渲染
    function renderHome() {
        return `
            <div style="text-align:center; margin-top: 40px;">
                <h1 class="glow-text" style="font-size:3rem;">✨ 创造起点 ✨</h1>
                <p style="margin: 20px 0; font-size:1.2rem;">你好，<strong>${fixedVisitorCode}</strong>，欢迎回到 <strong style="color:cyan;">HYC HTML工作台</strong>。</p>
                <button id="startFirstProjectBtn" style="background:linear-gradient(135deg,#ff416c,#ff4b2b); border:none; padding:16px 40px; font-size:1.3rem; border-radius:60px; color:white; font-weight:bold; margin-top:20px; cursor:pointer;">🚀 开始你的第一个项目</button>
                <div style="margin-top:60px; background:#0e1622; border-radius:30px; padding:20px;">
                    <p>💡 导航栏「开始编程」可创建项目，保存到「程序库」永久记忆。</p>
                    <p>🎁 神秘代码: HYC666 可激活无限累计币</p>
                </div>
            </div>
        `;
    }
    
    // 程序库页面 ———— 绝对不显示任何按钮，完全空的状态！
    function renderProgramLibrary() {
        if (!programLibrary.length) {
            // 完全空白，没有任何按钮、没有任何可点击的东西
            return `<div class="empty-library">📭 程序库为空</div>`;
        }
        // 如果有程序才显示列表
        let html = `<h2>📚 程序库 · 你的作品集</h2><div class="grid-cards">`;
        programLibrary.forEach(prog => {
            html += `
                <div class="code-card" data-id="${prog.id}">
                    <div class="card-title">📄 ${escapeHtml(prog.name)}.${prog.type}</div>
                    <div class="card-actions">
                        <button class="download-btn" data-id="${prog.id}">📥 下载</button>
                        <button class="viewcode-btn" data-id="${prog.id}">🔍 查看源码</button>
                        <button class="rename-btn" data-id="${prog.id}">✏️ 改名</button>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }
    
    function renderAssets() {
        let html = `<h2>🎨 素材宝库 (每份素材 10 币/下载或查看源码)</h2><div class="grid-cards">`;
        assetLibrary.forEach(asset => {
            html += `
                <div class="code-card">
                    <div class="card-title">✨ ${escapeHtml(asset.name)}</div>
                    <div class="card-actions">
                        <button class="asset-download" data-id="${asset.id}">⬇️ 下载文件</button>
                        <button class="asset-viewcode" data-id="${asset.id}">📄 查看源码</button>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        return html;
    }
    
    function renderCodingIDE() {
        return `
            <h2>✍️ 高级编程工坊</h2>
            <div class="code-ide">
                <div class="ide-toolbar">
                    <input type="text" id="projName" placeholder="项目名称" value="新项目">
                    <select id="fileTypeSelect">
                        <option value="html">.html</option>
                        <option value="js">.js</option>
                        <option value="css">.css</option>
                    </select>
                    <button id="saveProgramBtn" style="background:cyan; color:black;">💾 保存到程序库</button>
                    <button id="runPreviewBtn">▶ 运行预览</button>
                </div>
                <div class="editor-area">
                    <textarea id="codeEditor" placeholder="编写你的 HTML/JS/CSS 代码 ..."></textarea>
                    <div class="preview-area">
                        <strong>⚡ 实时预览</strong>
                        <iframe id="livePreview" srcdoc="<h3 style='color:white;background:#333;padding:1rem'>代码预览区域</h3>"></iframe>
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderAbout() {
        const infinityBadge = infiniteMode ? '<span class="infinity-badge">∞ 无限币已激活</span>' : '';
        return `
            <div style="display:flex; align-items:center; gap: 28px; flex-wrap:wrap;">
                <div style="background:#152032; border-radius:100%; width:120px; height:120px; display:flex; align-items:center; justify-content:center; border:3px solid cyan;">
                    <span style="font-size: 70px;">👤</span>
                </div>
                <div>
                    <h1>HYC · 作者 <span class="blue-verified">蓝V官方认证 ✔️</span> ${infinityBadge}</h1>
                    <p>HTML · CSS 全栈创作者，独立开发者。缩写 HYC，打造极客创意工具集。</p>
                </div>
            </div>
        `;
    }
    
    function showInviteModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3>🎫 神秘邀请</h3>
                <input type="text" id="secretCodeInput" class="mystery-input" placeholder="输入特权代码">
                <button id="submitSecretBtn" style="background:cyan; color:black;">验证</button>
                <button id="closeInviteBtn">关闭</button>
            </div>
        `;
        document.body.appendChild(modalDiv);
        document.getElementById('submitSecretBtn').onclick = () => {
            const code = document.getElementById('secretCodeInput').value.trim();
            if(code === "HYC666") activateInfiniteCoins();
            else alert("无效代码");
            modalDiv.remove();
        };
        document.getElementById('closeInviteBtn').onclick = () => modalDiv.remove();
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    let currentActivePage = "home";
    function loadPage(pageId) {
        currentActivePage = pageId;
        const container = document.getElementById("pageContent");
        if(pageId === "home") container.innerHTML = renderHome();
        else if(pageId === "library") container.innerHTML = renderProgramLibrary();
        else if(pageId === "coding") container.innerHTML = renderCodingIDE();
        else if(pageId === "assets") container.innerHTML = renderAssets();
        else if(pageId === "about") container.innerHTML = renderAbout();
        else if(pageId === "invite") { showInviteModal(); container.innerHTML = `<div style="text-align:center;">✨ 弹出神秘验证窗口 ✨</div>`; return; }
        
        if(pageId !== "invite") bindEvents();
    }
    
    function bindEvents() {
        // 素材库
        document.querySelectorAll('.asset-download').forEach(btn => {
            btn.onclick = () => {
                const asset = assetLibrary.find(a => a.id === btn.dataset.id);
                if(asset && spendCoins(10)) {
                    const blob = new Blob([asset.code], {type: 'text/html'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${asset.name.replace(/\s/g,'_')}.html`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                    alert("下载成功！");
                }
            };
        });
        document.querySelectorAll('.asset-viewcode').forEach(btn => {
            btn.onclick = () => {
                const asset = assetLibrary.find(a => a.id === btn.dataset.id);
                if(asset && spendCoins(10)) alert(`📜 源代码:\n\n${asset.code}`);
            };
        });
        // 程序库操作（仅在非空时存在）
        document.querySelectorAll('.download-btn').forEach(btn => {
            btn.onclick = () => {
                const prog = programLibrary.find(p => p.id === btn.dataset.id);
                if(prog) {
                    const blob = new Blob([prog.code], {type: prog.type === 'html' ? 'text/html' : (prog.type === 'js' ? 'application/javascript' : 'text/css')});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `${prog.name}.${prog.type}`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                }
            };
        });
        document.querySelectorAll('.viewcode-btn').forEach(btn => {
            btn.onclick = () => {
                const prog = programLibrary.find(p => p.id === btn.dataset.id);
                if(prog) alert(`源代码:\n\n${prog.code}`);
            };
        });
        document.querySelectorAll('.rename-btn').forEach(btn => {
            btn.onclick = () => {
                const prog = programLibrary.find(p => p.id === btn.dataset.id);
                if(prog) {
                    const newName = prompt("新名称(不含扩展名)", prog.name);
                    if(newName?.trim()) {
                        prog.name = newName.trim();
                        saveLibraryToMemory();
                        loadPage(currentActivePage);
                    }
                }
            };
        });
        
        const startBtn = document.getElementById("startFirstProjectBtn");
        if(startBtn) startBtn.onclick = () => document.querySelector('.nav-btn[data-page="coding"]').click();
        
        const saveBtn = document.getElementById("saveProgramBtn");
        if(saveBtn) {
            saveBtn.onclick = () => {
                const name = document.getElementById("projName").value.trim() || "未命名";
                const type = document.getElementById("fileTypeSelect").value;
                const code = document.getElementById("codeEditor").value;
                if(!code) { alert("请输入代码"); return; }
                programLibrary.push({ id: Date.now() + "_" + Math.random(), name, type, code });
                saveLibraryToMemory();
                alert(`✅ 项目「${name}」已保存至程序库！`);
            };
        }
        const runBtn = document.getElementById("runPreviewBtn");
        if(runBtn) {
            runBtn.onclick = () => {
                const code = document.getElementById("codeEditor").value;
                document.getElementById("livePreview").srcdoc = code;
            };
        }
    }
    
    function initApp() {
        fixedVisitorCode = getOrCreateVisitorCode();
        document.getElementById("randomUserTag").innerText = fixedVisitorCode;
        
        const savedCoins = localStorage.getItem("hyc_userCoins");
        const savedInfinite = localStorage.getItem("hyc_infiniteMode");
        if(savedInfinite === "true") infiniteMode = true;
        if(savedCoins !== null && !infiniteMode) userCoins = parseInt(savedCoins);
        else if(!infiniteMode) userCoins = 10;
        updateCoinUI();
        
        // 加载程序库（绝对不添加任何默认程序）
        loadLibraryFromMemory();
        
        // 额外检查：如果程序库里有任何程序但不是用户期望的，用户可手动点清空按钮
        
        loadPage("home");
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.dataset.page;
                loadPage(page);
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
        
        // 清空按钮事件
        const clearBtn = document.getElementById("forceClearLibraryBtn");
        if(clearBtn) {
            clearBtn.onclick = () => {
                if(confirm("⚠️ 确定要彻底清空程序库吗？所有保存的程序都会被删除，且不可恢复！")) {
                    forceClearLibrary();
                }
            };
        }
    }
    
    document.getElementById("enterBtn").addEventListener("click", () => {
        const splash = document.getElementById("splash");
        const main = document.getElementById("mainApp");
        splash.style.opacity = "0";
        setTimeout(() => {
            splash.style.display = "none";
            main.style.display = "block";
            setTimeout(() => main.style.opacity = "1", 20);
            initApp();
        }, 400);
    });
</script>
</body>
</html>
